version: "3.8"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=mock
      - DATABASE_URL=sqlite:///./lifearchive.db
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./apps/api/uploads:/app/uploads
      - ./examples:/app/examples

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
